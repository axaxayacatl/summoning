<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Axayacatl</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
min-height:100%;
overflow-y:auto;
}

body{

background:#030303;

display:flex;
justify-content:center;
align-items:flex-start;

position:relative;

font-family:Inter,sans-serif;

color:#fff;

padding:80px 0;

}


/* synthetic glass atmosphere */

body:before{

content:"";

position:fixed;

inset:0;

background:

radial-gradient(
ellipse at 50% 45%,
rgba(255,255,255,.08),
transparent 32%
),

linear-gradient(
120deg,
#050505,
#101010,
#030303
);

z-index:-2;

}


/* holographic reflective scan */

body:after{

content:"";

position:fixed;

inset:-50%;

background:

linear-gradient(
115deg,
transparent 35%,
rgba(255,255,255,.02) 42%,
rgba(255,255,255,.18) 49%,
rgba(255,255,255,.03) 55%,
transparent 65%
);

filter:blur(35px);

animation:

scan 12s cubic-bezier(.4,0,.2,1) infinite;

z-index:-1;

}


@keyframes scan{

0%{

transform:
translateX(-45%)
rotate(-8deg);

opacity:.15;

}

35%{

opacity:.7;

}

70%{

opacity:.35;

}

100%{

transform:
translateX(45%)
rotate(8deg);

opacity:.15;

}

}


/* micro digital grain */

.grain{

position:fixed;

inset:0;

opacity:.08;

background-image:

url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='180' height='180' filter='url(%23n)'/%3E%3C/svg%3E");

mix-blend-mode:screen;

pointer-events:none;

}


/* interface */

.container{

width:86%;

max-width:380px;

display:flex;

flex-direction:column;

align-items:center;

z-index:5;

}


nav{

width:100%;

display:flex;

flex-direction:column;

gap:10px;

}


a{

height:58px;

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

color:#eee;


border:1px solid rgba(255,255,255,.14);

background:

linear-gradient(
90deg,
rgba(255,255,255,.015),
rgba(255,255,255,.06),
rgba(255,255,255,.015)
);


font-size:10px;

letter-spacing:.45em;

text-transform:lowercase;


transition:.5s;

position:relative;

overflow:hidden;

}



a:before{

content:"";

position:absolute;

top:0;
left:-100%;

height:100%;
width:80%;

background:

linear-gradient(
90deg,
transparent,
rgba(255,255,255,.15),
transparent
);

transition:.8s;

}


a:hover:before{

left:120%;

}


a:hover{

border-color:rgba(255,255,255,.45);

}



/* logo */

.signature{

margin-top:60px;

font-family:"Cormorant Garamond",serif;

font-size:54px;

font-weight:300;

letter-spacing:.12em;

color:#fff;

padding-bottom:80px;

}


/* subtle coordinates */

.data{

position:fixed;

top:25px;

right:28px;

font-size:8px;

letter-spacing:.4em;

color:rgba(255,255,255,.25);

font-family:Inter;

}


</style>

</head>

<body>


<div class="grain"></div>

<div class="data">
AX // 001
</div>
